# ~/.tmux.conf - Catppuccin Macchiato v2 + Battery/Date/CPU

unbind C-b
set -g prefix C-s
bind C-s send-prefix

bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

bind C-p previous-window
bind C-n next-window
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g set-titles on
setw -g monitor-activity on
set -g default-terminal "${TERM}"
set -g history-limit 1000000
set -g set-clipboard on

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind d detach-client

set -g status-interval 2
set -g status-left-length 40
set -g status-right-length 160

# ── Catppuccin v2 Configuration ──────────────────────────
# IMPORTANT: flavor MUST be set BEFORE loading catppuccin.tmux
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text '#W'
set -g @catppuccin_window_current_text '#W#{?window_zoomed_flag,(),}'
set -g @catppuccin_window_number_position 'left'
set -g @catppuccin_window_flags 'none'
set -g @catppuccin_date_time_text ' %d-%b %H:%M:%S'

# Battery: call scripts directly to avoid interpolation issues
set -g @catppuccin_battery_icon "#(~/.tmux/plugins/tmux-battery/scripts/battery_icon.sh) "
set -g @catppuccin_battery_text " #(~/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh)"

# Load catppuccin (this sets theme colors + default separators)
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Custom RAM module - loaded via source-file after catppuccin so theme
# colors and separators are available
source-file '/Users/malate/.tmux/ram_module.conf'

# Configure status line AFTER catppuccin is loaded
# Left: [windows] (default)
# Right: [session] [ram] [battery icon + %] [date + time]
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ── Plugins (TPM) ──────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# TPM MUST be loaded last
run '~/.tmux/plugins/tpm/tpm'
